<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentraHub | Register</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="container">
    
    <div class="left">
        <div class="card">
            <h1>Join MentraHub!</h1>
            <p class="subtitle">Create your account</p>

            <p class="error" th:if="${error}" th:text="${error}"></p>

            <form th:action="@{/auth/register}" method="post">
                <label>Full Name:</label>
                <input type="text" name="fullName" required placeholder="Enter your full name">

                <label>Username:</label>
                <input type="text" name="matricNo" required placeholder="Enter matric number">

                <label>Email:</label>
                <input type="email" name="email" required placeholder="Enter your email">

                <label>Password:</label>
                <input type="password" name="password" required placeholder="Create a password">

                <label>Confirm Password:</label>
                <input type="password" name="confirmPassword" required placeholder="Confirm your password">

                <button type="submit">Register</button>
            </form>

            <p class="form-footer">
                Already have an account? <a th:href="@{/auth/login}">Login</a>
            </p>
        </div>
    </div>

    
    <div class="right">
        <div class="illustration">
            <svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
                
                <ellipse cx="200" cy="160" rx="180" ry="140" fill="#8F97E8" opacity="0.3"/>
                
                
                <rect x="120" y="80" width="160" height="120" rx="12" fill="#7DD3C0"/>
                <polygon points="120,80 200,140 280,80" fill="#6BC4AF"/>
                <polygon points="120,200 170,150 200,170 230,150 280,200" fill="#5BB89E"/>
                
                
                <rect x="240" y="60" width="35" height="25" rx="3" fill="#FFD93D"/>
                <rect x="245" y="65" width="25" height="15" rx="2" fill="#F2B6C6"/>
                
                
                
                <rect x="40" y="180" width="80" height="50" rx="6" fill="#4A4E8C"/>
                <rect x="45" y="185" width="70" height="40" rx="3" fill="#2E3266"/>
                <rect x="30" y="230" width="100" height="8" rx="3" fill="#5A5E9C"/>
                
                
                <circle cx="320" cy="100" r="35" fill="#FFFFFF"/>
                <circle cx="310" cy="95" r="12" fill="#F2B6C6"/>
                <rect x="325" y="88" width="20" height="4" rx="2" fill="#C7CBF3"/>
                <rect x="325" y="96" width="15" height="3" rx="1.5" fill="#EDEEFF"/>
                <text x="315" y="120" font-family="Poppins" font-size="8" fill="#6B6B6B">Welcome!</text>
                
                
                <circle cx="100" cy="60" r="5" fill="#FFD93D"/>
                <circle cx="300" cy="200" r="4" fill="#F2B6C6"/>
                <circle cx="350" cy="160" r="3" fill="#6C74D8"/>
                
                
                <ellipse cx="340" cy="250" rx="20" ry="15" fill="#9B6B9E"/>
                <ellipse cx="340" cy="245" rx="16" ry="12" fill="#FFD93D"/>
            </svg>
        </div>
    </div>
</div>

</body>
</html>
