<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentraHub | Login</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="container">
    
    <div class="left">
        <div class="card">
            <h1>Welcome to MentraHub!</h1>
            <p class="subtitle">Your mental health companion</p>

            <p class="success" th:if="${success}" th:text="${success}"></p>

            <form th:action="@{/auth/login}" method="post">
                <label>Username:</label>
                <input type="email" name="email" required placeholder="Enter your email">

                <label>Password:</label>
                <input type="password" name="password" required placeholder="Enter your password">

                <button type="submit">Login</button>

                <p class="error" th:if="${error}" th:text="${error}"></p>
            </form>

            <p class="form-footer">
                Don't have an account? <a th:href="@{/auth/register}">Register</a>
            </p>
        </div>
    </div>

    
    <div class="right">
        <div class="illustration">
            <svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
                
                <ellipse cx="200" cy="160" rx="180" ry="140" fill="#8F97E8" opacity="0.3"/>
                
                
                <rect x="80" y="50" width="240" height="160" rx="12" fill="#4A4E8C"/>
                <rect x="95" y="65" width="210" height="130" rx="6" fill="#2E3266"/>
                
                
                <rect x="110" y="80" width="80" height="8" rx="4" fill="#6C74D8" opacity="0.7"/>
                <rect x="110" y="95" width="120" height="6" rx="3" fill="#8F97E8" opacity="0.5"/>
                <rect x="110" y="108" width="100" height="6" rx="3" fill="#8F97E8" opacity="0.5"/>
                <rect x="110" y="130" width="60" height="20" rx="10" fill="#6C74D8"/>
                <circle cx="260" cy="120" r="25" fill="#F2B6C6" opacity="0.6"/>
                
                
                <path d="M60 210 L80 210 L80 215 L320 215 L320 210 L340 210 L340 230 C340 240 330 250 320 250 L80 250 C70 250 60 240 60 230 Z" fill="#5A5E9C"/>
                <rect x="160" y="220" width="80" height="8" rx="4" fill="#4A4E8C"/>
                
                
                <rect x="100" y="200" width="40" height="4" rx="2" fill="#FFD93D"/>
                <rect x="150" y="200" width="30" height="4" rx="2" fill="#9B6B9E"/>
                
                
                
                <ellipse cx="350" cy="180" rx="25" ry="20" fill="#9B6B9E"/>
                <ellipse cx="350" cy="175" rx="20" ry="15" fill="#FFD93D"/>
                <path d="M370 175 Q385 180 370 195" stroke="#9B6B9E" stroke-width="4" fill="none"/>
                
                
                <rect x="30" y="200" width="30" height="40" rx="5" fill="#7DD3C0"/>
                <ellipse cx="45" cy="190" rx="20" ry="15" fill="#5BB89E"/>
                <ellipse cx="35" cy="185" rx="12" ry="10" fill="#6BC4AF"/>
                <ellipse cx="55" cy="188" rx="10" ry="8" fill="#7DD3C0"/>
                
                
                <rect x="300" y="40" width="60" height="40" rx="8" fill="#FFFFFF"/>
                <circle cx="320" cy="55" r="8" fill="#F2B6C6"/>
                <rect x="332" y="52" width="20" height="4" rx="2" fill="#C7CBF3"/>
                <rect x="332" y="60" width="15" height="3" rx="1.5" fill="#EDEEFF"/>
            </svg>
        </div>
    </div>
</div>

</body>
</html>
